# Release builds: pushed tag v* → static musl binaries + macOS build +
# Docker image attached to a GitHub Release.
name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
  packages: write
jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            setup: sudo apt-get update && sudo apt-get install -y musl-tools
          - name: linux-aarch64-musl
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            setup: sudo apt-get update && sudo apt-get install -y musl-tools
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            setup: ""
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Setup
        if: matrix.setup != ''
        run: ${{ matrix.setup }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p nzbd --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf nzbd-${{ github.ref_name }}-${{ matrix.name }}.tar.gz nzbd
          shasum -a 256 nzbd-${{ github.ref_name }}-${{ matrix.name }}.tar.gz \
            > nzbd-${{ github.ref_name }}-${{ matrix.name }}.tar.gz.sha256
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/nzbd-*.tar.gz
            target/${{ matrix.target }}/release/nzbd-*.tar.gz.sha256

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
