name: Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: unit + e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The whole pyramid: parser/codec/ladder unit tests, engine e2e
      # against the mock NNTP server (incl. kill-and-resume), multi-node
      # cluster tests (election, failover, reclaim), and the whole-daemon
      # CLI/compat test that boots the real binary.
      - name: cargo test
        run: cargo test --workspace

  msrv:
    name: MSRV check (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - name: cargo check on the minimum supported Rust version
        run: cargo check --workspace --all-targets
