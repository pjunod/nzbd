# Dev compose — builds the image LOCALLY from the repo's Dockerfile and
# runs it with a throwaway data dir. For testing the container itself;
# the faster inner loop for engine work is plain `cargo run -p nzbd`.
#
#   cd dev
#   mkdir -p config data              # BEFORE up: if compose creates these
#                                     # bind-mount dirs for you they're owned
#                                     # by root, and the setup UI can't write
#                                     # config/nzbd.toml (chown -R $USER fixes)
#   docker compose up --build         # build + run (foreground, logs)
#   # → http://localhost:6789/ serves the first-run setup UI, which
#   #   writes config/nzbd.toml and restarts the daemon with it.
#   # (Or pre-seed: cp nzbd.toml.example config/nzbd.toml)
#
# Rebuild-on-change (Compose v2.22+): `docker compose watch` rebuilds the
# image whenever crate sources or the Dockerfile change.

services:
  nzbd:
    build:
      context: ..                # repo root (the Dockerfile lives there)
      dockerfile: Dockerfile
    image: nzbd:dev
    container_name: nzbd-dev
    ports:
      - "6789:6789"
    volumes:
      - ./data:/data             # throwaway downloads/state, easy to inspect
      # Config DIRECTORY (mkdir -p config first). Start with it empty and
      # the first-run setup UI at http://localhost:6789/ writes
      # config/nzbd.toml for you — or pre-seed it from nzbd.toml.example.
      - ./config:/etc/nzbd
    environment:
      - TZ=Etc/UTC
      - RUST_LOG=debug           # dev default; drop to info if too chatty
    healthcheck:
      test: ["CMD", "nzbd", "status", "--url", "127.0.0.1:6789"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    develop:
      watch:
        - action: rebuild
          path: ../crates
        - action: rebuild
          path: ../Cargo.toml
        - action: rebuild
          path: ../Cargo.lock
        - action: rebuild
          path: ../Dockerfile
