apiVersion: v1
kind: Service
metadata:
  name: nzbd
  namespace: nzbd
  labels:
    app: nzbd
spec:
  type: ClusterIP
  selector:
    app: nzbd
  ports:
    - name: http
      port: 6789
      targetPort: http
# In-cluster clients (Sonarr etc.) reach this as nzbd.nzbd.svc:6789.
# For outside access put an Ingress or LoadBalancer in front — and set
# [api] password in the config Secret first.
