# The complete nzbd.toml lives in a Secret (not a ConfigMap) because it
# carries news-server credentials and the API password.
# Reference: docs/CONFIGURATION.md
apiVersion: v1
kind: Secret
metadata:
  name: nzbd-config
  namespace: nzbd
type: Opaque
stringData:
  nzbd.toml: |
    [paths]
    main_dir = "/data"
    dest_dir = "/data/complete"

    [[server]]
    name = "primary"
    host = "news.example.com"
    port = 563
    tls = true
    username = "CHANGE-ME"
    password = "CHANGE-ME"
    connections = 20

    [[category]]
    name = "tv"

    [[category]]
    name = "movies"

    [api]
    bind = "0.0.0.0:6789"
    password = "CHANGE-ME"
